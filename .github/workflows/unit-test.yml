# This file is generated by actionspack. Do not edit it manually.

name: Unit Test

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: '1'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          cache: pnpm
          package-manager-cache: true
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        run: pnpm install

      - name: Type Check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

  unit-test-test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - 22
          - 24
          - 26
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: '1'

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          package-manager-cache: true
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        shell: bash
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Unit Test
        run: pnpm run test
